name: career_lens_flutter
description: AI-powered career guidance platform for Bangladesh and Global job markets
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Theme
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Environment
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  
  # File Handling
  file_picker: ^8.1.0
  path_provider: ^2.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.0
  dotted_border: ^2.1.0
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/images/icons/